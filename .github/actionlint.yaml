paths:
  .github/workflows/{holding-safety,recovery-cleanup,recovery-evidence,release-containment,vercel-holding,vercel-release}.yml:
    ignore:
      # GitHub supports concurrency.queue, but actionlint 1.7.12 has not added it to its schema yet.
      - 'unexpected key "queue" for "concurrency" section\. expected one of "cancel-in-progress", "group"'
