name: Marketing site deploy

on:
  workflow_dispatch:
    inputs:
      production:
        description: "Publish to the production Vercel target"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: marketing-site-deploy-${{ inputs.production && 'production' || 'preview' }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    env:
      DEPLOY_ENV: ${{ inputs.production && 'production' || 'preview' }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.MARKETING_VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify static site
        run: npm run verify

      - name: Pull Vercel project settings
        run: npx vercel@56.1.0 pull --yes --environment="$DEPLOY_ENV"

      - name: Build preview
        if: env.DEPLOY_ENV == 'preview'
        run: npx vercel@56.1.0 build

      - name: Build production release
        if: env.DEPLOY_ENV == 'production'
        run: npx vercel@56.1.0 build --prod

      - name: Deploy preview
        if: env.DEPLOY_ENV == 'preview'
        run: |
          DEPLOYMENT_URL="$(npx vercel@56.1.0 deploy --prebuilt --target=preview --yes)"
          echo "### Marketing preview" >> "$GITHUB_STEP_SUMMARY"
          echo "$DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy production release
        if: env.DEPLOY_ENV == 'production'
        run: |
          DEPLOYMENT_URL="$(npx vercel@56.1.0 deploy --prebuilt --prod --yes)"
          echo "### Marketing production deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "$DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"
