name: Operate Kin Resolve synthetic staging demo session
run-name: Kin Resolve staging demo ${{ inputs.action }} run ${{ github.run_id }} attempt ${{ github.run_attempt }}

on:
  workflow_dispatch:
    inputs:
      action:
        description: Historical marker only; this workflow is retired
        required: true
        type: choice
        options:
          - open
          - close

permissions:
  contents: read

concurrency:
  group: kinresolve-public-demo-release
  cancel-in-progress: false

jobs:
  retired:
    name: Refuse retired staging demo operation
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Preserve a credential-free historical workflow tombstone
        run: |
          echo "This legacy staging demo workflow is retired."
          echo "Use the public demo holding and release workflows documented in docs/public-demo-runbook.md."
