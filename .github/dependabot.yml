version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # TypeScript 7 is not yet supported by Next.js or typescript-eslint.
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
  - package-ecosystem: "npm"
    directory: "/site"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
  # Action bumps move SHA pins that contract tests in tests/ assert verbatim;
  # each such PR needs the pinned strings updated in the same change (they fail
  # closed until then). Centralized pin constants make that a one-file edit.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      actions:
        patterns:
          - "*"
