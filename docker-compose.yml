services:
  app:
    build: .
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      APP_BASE_URL: http://localhost:3000
      AUTH_SECRET: local-dev-secret-change-me
      DATABASE_URL: postgres://kinsleuth:kinsleuth@postgres:5432/kinsleuth
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_BUCKET: kinsleuth
      S3_ACCESS_KEY_ID: kinsleuth
      S3_SECRET_ACCESS_KEY: kinsleuth-secret
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_API_MODE: ${AI_API_MODE:-responses}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-gpt-5-mini}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-text-embedding-3-small}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
      - minio

  worker:
    build: .
    command: npm run worker
    environment:
      DATABASE_URL: postgres://kinsleuth:kinsleuth@postgres:5432/kinsleuth
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: kinsleuth
      S3_ACCESS_KEY_ID: kinsleuth
      S3_SECRET_ACCESS_KEY: kinsleuth-secret
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_API_MODE: ${AI_API_MODE:-responses}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-gpt-5-mini}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-text-embedding-3-small}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
      - minio
    profiles:
      - worker

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: kinsleuth
      POSTGRES_USER: kinsleuth
      POSTGRES_PASSWORD: kinsleuth
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: kinsleuth
      MINIO_ROOT_PASSWORD: kinsleuth-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
